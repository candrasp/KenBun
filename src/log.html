<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KenBun - Realtime Terminal Logs</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0c0c0c;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #terminal {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      word-wrap: break-word;
      font-size: 13px;
      line-height: 1.6;
    }

    #terminal::-webkit-scrollbar {
      width: 10px;
    }

    #terminal::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
    }

    #terminal::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .log-line {
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }

    .system {
      color: #38bdf8;
      font-weight: 600;
    }

    .error {
      color: #f87171;
    }

    .timestamp {
      color: #475569;
      font-size: 0.85em;
      user-select: none;
      min-width: 85px;
    }
    
    .message {
      flex: 1;
    }
  </style>
</head>

<body>
  <div id="terminal">
    <div class="log-line system">
      <span class="timestamp">[SYSTEM]</span>
      <span class="message">Terminal window connected. Waiting for logs...</span>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const terminal = document.getElementById('terminal');

      async function initTerminal() {
        // Tunggu sampai API Tauri tersedia
        if (!window.__TAURI__) {
          setTimeout(initTerminal, 100);
          return;
        }

        const { listen } = window.__TAURI__.event;
        const { invoke } = window.__TAURI__.core;

        const addLog = (text, type = 'normal') => {
          const line = document.createElement('div');
          line.className = 'log-line';

          // Timestamp
          const time = new Date().toLocaleTimeString();
          const timeSpan = document.createElement('span');
          timeSpan.className = 'timestamp';
          timeSpan.textContent = `[${time}]`;
          line.appendChild(timeSpan);

          // Message
          const msgSpan = document.createElement('span');
          msgSpan.className = 'message';
          
          if (text.toLowerCase().includes('error:') || text.toLowerCase().includes('failed') || type === 'error') {
            line.classList.add('error');
          } else if (text.toLowerCase().includes('system:') || type === 'system') {
            line.classList.add('system');
          }
          
          msgSpan.textContent = text.replace('SYSTEM:', '').replace('ERROR:', '');
          line.appendChild(msgSpan);

          terminal.appendChild(line);
          terminal.scrollTop = terminal.scrollHeight;

          // Limit lines
          if (terminal.children.length > 2000) {
            terminal.removeChild(terminal.firstChild);
          }
        };

        // 1. Fetch History
        try {
          const history = await invoke('get_log_history');
          if (history && history.length > 0) {
            terminal.innerHTML = ''; // Clear initial message
            history.forEach(msg => addLog(msg));
          }
        } catch (e) {
          console.error("Failed to fetch logs:", e);
        }

        // 2. Listen for Live Logs
        listen('log-event', (event) => {
          addLog(event.payload);
        });

        console.log("Terminal listener initialized.");
      }

      initTerminal();
    });
  </script>
</body>

</html>
